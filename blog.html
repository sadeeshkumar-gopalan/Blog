<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog | Sadeesh Kumar</title>
    <link rel="stylesheet" href="./assets/style.css?v=3">
    <style>
        /* Force 3-column grid - override any cached CSS */
        #blogPosts {
            display: grid !important;
            grid-template-columns: repeat(3, 1fr) !important;
            gap: 24px !important;
        }

        @media (max-width: 1024px) {
            #blogPosts {
                grid-template-columns: repeat(2, 1fr) !important;
            }
        }

        @media (max-width: 640px) {
            #blogPosts {
                grid-template-columns: 1fr !important;
            }
        }

        .blog-post-card {
            min-width: 0;
        }
    </style>

</head>

<body>
    <header class="header container">
        <div class="logo" style="font-weight: bold; font-size: 1.2rem;">Sadeesh Kumar</div>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="blog.html" class="active">Blog</a>
            <a href="certificates.html">Certificates</a>
            <a href="index.html#contact">Contact</a>
        </nav>
    </header>

    <main class="container">
        <h1 class="h1">Knowledge Updates & Insights</h1>
        <p class="h2">Regular updates on AI, Cybersecurity incidents, leadership perspectives, and important technology
            news.</p>

        <!-- Category Filters -->
        <div id="categoryFilters" class="category-filters">
            <button class="filter-btn active" data-category="all">All Topics</button>
            <!-- Categories will be loaded here dynamically -->
        </div>

        <!-- Blog posts will be loaded here dynamically -->
        <div id="blogPosts"></div>

        <!-- Single post view (hidden by default, shown when ?id= is in URL) -->
        <div id="blogPost" style="display: none;"></div>
    </main>

    <footer>
        © 2026 Sadeesh Kumar Gopalan
    </footer>

    <script src="config.js?v=cachebust1"></script>
    <script src="js/blog.js?v=cachebust1"></script>
</body>
