<!-- ===================== certificates.html ===================== -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Certificates & Awards | Sadeesh Kumar</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 32px;
            margin-top: 40px;
        }

        .cert-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .cert-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .cert-image-container {
            width: 100%;
            aspect-ratio: 4/3;
            overflow: hidden;
            background: #000;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .cert-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .cert-card:hover .cert-image {
            transform: scale(1.05);
        }

        .cert-info {
            padding: 24px;
        }

        .cert-issuer {
            color: var(--accent);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .cert-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .cert-date {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .cert-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* Modal for full image */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: var(--radius-md);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header class="header container">
        <div class="logo" style="font-weight: bold; font-size: 1.2rem;">Sadeesh Kumar</div>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="blog.html">Blog</a>
            <a href="certificates.html" class="active">Certificates</a>
            <a href="index.html#contact">Contact</a>
        </nav>
    </header>

    <section class="container" style="margin-top: 60px;">
        <h1 class="h1">Certificates & Awards</h1>
        <p class="h2">A collection of my professional certifications, awards, and recognitions in AI, Cybersecurity, and Leadership.</p>

        <div id="certContainer" class="cert-grid">
            <!-- Loading State -->
            <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">
                Loading certificates...
            </div>
        </div>
    </section>

    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImg">
    </div>

    <footer>
        © 2026 Sadeesh Kumar Gopalan
    </footer>

    <script src="config.js"></script>
    <script>
        const API_BASE_URL = window.API_BASE_URL || 'http://127.0.0.1:8000';
        document.addEventListener('DOMContentLoaded', async () => {
            const certContainer = document.getElementById('certContainer');
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            const closeBtn = document.querySelector('.close-modal');

            closeBtn.onclick = () => modal.style.display = "none";
            window.onclick = (e) => { if (e.target == modal) modal.style.display = "none"; }

            try {
                const response = await fetch(`${API_BASE_URL}/api/certificates`);
                const certs = await response.json();

                if (certs.length === 0) {
                    certContainer.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted); background: var(--card-bg); border-radius: var(--radius-md); border: 1px dashed var(--border);">
                            <p>No certificates uploaded yet.</p>
                        </div>
                    `;
                    return;
                }

                certContainer.innerHTML = certs.map(cert => `
                    <div class="cert-card">
                        <div class="cert-image-container" onclick="openModal('${API_BASE_URL}/uploads/${cert.image_url}')">
                            <img src="${API_BASE_URL}/uploads/${cert.image_url}" alt="${cert.title}" class="cert-image">
                        </div>
                        <div class="cert-info">
                            <div class="cert-issuer">${cert.issuer || ''}</div>
                            <h3 class="cert-title">${cert.title}</h3>
                            <div class="cert-date">${cert.issue_date || ''}</div>
                            <p class="cert-desc">${cert.description || ''}</p>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error fetching certificates:', error);
                certContainer.innerHTML = '<p>Error loading certificates. Please try again later.</p>';
            }
        });

        function openModal(imgSrc) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            modal.style.display = "flex";
            modalImg.src = imgSrc;
        }
    </script>

</body>

</html>
